name: Fetch docs from event-service

on:
  workflow_dispatch:

jobs:
  fetch-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          ref: claude/update-repo-docs-AUgYe

      - name: Debug token
        run: |
          if [ -z "${{ secrets.CROSS_REPO_PAT }}" ]; then
            echo "::error::CROSS_REPO_PAT secret is empty!"
            exit 1
          fi
          echo "Token length: ${#TOKEN}"
          echo "Token prefix: ${TOKEN:0:4}..."
        env:
          TOKEN: ${{ secrets.CROSS_REPO_PAT }}

      - name: Checkout event-service docs
        uses: actions/checkout@v4
        with:
          repository: ledger-rocket/event-service
          ref: claude/download-docs-locally-w8igP
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: event-service-docs
          sparse-checkout: docs/mintlify

      - name: Remove scaffold and move docs into place
        run: |
          rm -rf essentials/ ai-tools/ snippets/ api-reference/endpoint/ api-reference/openapi.json api-reference/introduction.mdx quickstart.mdx development.mdx index.mdx
          cp -r event-service-docs/docs/mintlify/* .
          rm -rf event-service-docs/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: replace scaffold with LedgerRocket documentation"
          git push
