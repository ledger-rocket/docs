name: Fetch docs from event-service

on:
  workflow_dispatch:

jobs:
  fetch-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          ref: claude/update-repo-docs-AUgYe

      - name: Fetch event-service docs
        run: |
          git fetch https://x-access-token:${{ secrets.CROSS_REPO_PAT }}@github.com/ledger-rocket/event-service.git claude/download-docs-locally-w8igP
          git checkout FETCH_HEAD -- docs/mintlify/

      - name: Remove scaffold and move docs into place
        run: |
          rm -rf essentials/ ai-tools/ snippets/ api-reference/endpoint/ api-reference/openapi.json api-reference/introduction.mdx quickstart.mdx development.mdx index.mdx
          cp -r docs/mintlify/* .
          rm -rf docs/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: replace scaffold with LedgerRocket documentation"
          git push
